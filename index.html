<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Command Explainer | Understand any command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-3xl w-full space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Linux Command Explainer
            </h1>
            <p class="mt-3 text-gray-400 text-lg">Understand any Linux command in seconds.</p>
        </div>

        <div class="glass-morphism p-6 rounded-2xl shadow-2xl">
            <div class="relative">
                <input type="text" id="commandInput" 
                    placeholder="e.g. ls -la or tar -xzvf archive.tar.gz" 
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl py-4 px-6 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-lg font-mono">
                <button onclick="explainCommand()" 
                    class="absolute right-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-500 px-6 rounded-lg font-bold transition-colors">
                    Explain
                </button>
            </div>
            <p id="errorMsg" class="mt-2 text-red-400 text-sm hidden">Please enter a command.</p>
        </div>

        <div id="resultArea" class="hidden space-y-4">
            <div class="glass-morphism p-6 rounded-2xl border-l-4 border-emerald-500">
                <h3 class="text-emerald-400 font-bold mb-2 uppercase text-xs tracking-widest">The Breakdown</h3>
                <div id="explanationOutput" class="space-y-4 font-mono text-sm leading-relaxed">
                    </div>
            </div>
        </div>

        <footer class="text-center text-gray-500 text-sm">
            <p>Made for DevOps Engineers & Terminal Lovers</p>
            <a href="https://github.com/eknatha" class="hover:text-blue-400 transition-colors"><i class="fab fa-github mt-4 text-xl"></i></a>
        </footer>
    </div>

    <script>
        // Simple Dictionary Logic (To avoid 'Failed to Fetch')
        const dictionary = {
            "ls": "Lists directory contents.",
            "-l": "Use a long listing format (shows permissions, owner, size).",
            "-a": "Do not ignore entries starting with . (shows hidden files).",
            "tar": "An archiving utility used to store/extract files.",
            "-x": "Extract files from an archive.",
            "-z": "Filter the archive through gzip (compression).",
            "-v": "Verbosely list files processed.",
            "-f": "Use archive file or device ARCHIVE.",
            "sudo": "Execute a command as another user (usually superuser).",
            "grep": "Print lines that match patterns.",
            "chmod": "Change file mode bits (permissions).",
            "chown": "Change file owner and group."
        };

        function explainCommand() {
            const input = document.getElementById('commandInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            const output = document.getElementById('explanationOutput');
            const errorMsg = document.getElementById('errorMsg');

            if (!input) {
                errorMsg.classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');
            output.innerHTML = "";
            resultArea.classList.remove('hidden');

            const parts = input.split(/\s+/);
            
            parts.forEach((part, index) => {
                let meaning = dictionary[part] || "Argument or unknown parameter.";
                
                const item = document.createElement('div');
                item.className = "p-3 bg-slate-900/50 rounded-lg border border-slate-700 hover:border-blue-500 transition-all";
                item.innerHTML = `
                    <span class="text-blue-400 font-bold">${part}</span>
                    <span class="text-gray-500 mx-2">→</span>
                    <span class="text-gray-300">${meaning}</span>
                `;
                output.appendChild(item);
            });
        }

        // Allow Enter key to trigger search
        document.getElementById('commandInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') explainCommand();
        });
    </script>
</body>
</html>
