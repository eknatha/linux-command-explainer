<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Linux Command Explainer Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg: #020617;
  --card: #0f172a;
  --text: #e2e8f0;
}

.light {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #020617;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui;
  margin: 0;
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: var(--card);
  font-weight: bold;
  color: #38bdf8;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: var(--card);
  color: var(--text);
  font-size: 16px;
}

.card {
  background: var(--card);
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

.cmd { color: #22c55e; font-weight: bold; }
.flag { color: #facc15; }
.pipe { color: #f87171; }

.example {
  background: rgba(0,0,0,0.2);
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
  font-family: monospace;
}

.suggestion {
  cursor: pointer;
  padding: 5px;
  display: inline-block;
  background: #1e293b;
  margin: 5px;
  border-radius: 6px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  cursor: pointer;
}

.footer {
  text-align: center;
  margin-top: 40px;
  padding: 20px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">
  <div>🚀 EknathaLabs</div>
  <button onclick="toggleTheme()">🌗 Toggle</button>
</div>

<div class="container">

<h2>🐧 Linux Command Explainer Pro</h2>

<input id="input" placeholder="Try: ls -la | grep txt" />

<div id="suggestions"></div>
<button onclick="copyLink()">🔗 Copy Share Link</button>

<div id="output"></div>
<div id="ai"></div>

<p>👀 Visitors: <span id="visits">Loading...</span></p>

<div class="footer">
  Built by <strong>eknathalabs.com</strong> ·
</div>

</div>

<script>
const COMMANDS = {
  ls: {
    desc: "List directory contents",
    examples: ["ls", "ls -la", "ls /var/log"],
    use: "View files in a directory"
  },
  grep: {
    desc: "Search text patterns",
    examples: ["grep error file.log", "ls | grep txt"],
    use: "Log filtering & search"
  },
  cd: {
    desc: "Change directory",
    examples: ["cd /home", "cd .."],
    use: "Navigate filesystem"
  },
  rm: {
    desc: "Remove files",
    examples: ["rm file.txt", "rm -rf folder"],
    use: "Delete files"
  }
};

const FLAGS = {
  "-l": "Long listing",
  "-a": "Show hidden files",
  "-r": "Recursive",
  "-f": "Force delete"
};

const input = document.getElementById("input");
const output = document.getElementById("output");
const suggestions = document.getElementById("suggestions");

input.addEventListener("input", () => {
  explain(input.value);
  autoSuggest(input.value);
});

function explain(text) {
  if (!text) return output.innerHTML = "";

  let tokens = text.split(" ");
  let html = "";

  tokens.forEach(t => {
    if (COMMANDS[t]) {
      let cmd = COMMANDS[t];
      html += `
      <div class="card">
        <div class="cmd">${t}</div>
        <p>${cmd.desc}</p>

        <strong>Examples:</strong>
        ${cmd.examples.map(e => `<div class="example">${e}</div>`).join("")}

        <strong>Use Case:</strong>
        <p>${cmd.use}</p>
      </div>`;
    }
    else if (FLAGS[t]) {
      html += `<div class="card"><div class="flag">${t}</div><p>${FLAGS[t]}</p></div>`;
    }
    else if (t === "|") {
      html += `<div class="card"><div class="pipe">|</div><p>Pipe output</p></div>`;
    }
    else if (t) {
      html += `<div class="card">${t} → argument</div>`;
    }
  });

  output.innerHTML = html;
  aiExplain(text);
}

function autoSuggest(text) {
  let last = text.split(" ").pop();
  let matches = Object.keys(COMMANDS).filter(c => c.startsWith(last));

  suggestions.innerHTML = matches.map(m =>
    `<span class="suggestion" onclick="selectSuggestion('${m}')">${m}</span>`
  ).join("");
}

function selectSuggestion(cmd) {
  input.value = cmd + " ";
  explain(input.value);
}

function copyLink() {
  let url = location.origin + location.pathname + "?cmd=" + encodeURIComponent(input.value);
  navigator.clipboard.writeText(url);
  alert("Link copied!");
}

function toggleTheme() {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

function loadTheme() {
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }
}

async function visitorCount() {
  let res = await fetch("https://api.countapi.xyz/hit/eknathalabs/linux-explainer");
  let data = await res.json();
  document.getElementById("visits").innerText = data.value;
}

function loadFromURL() {
  let params = new URLSearchParams(window.location.search);
  let cmd = params.get("cmd");
  if (cmd) {
    input.value = cmd;
    explain(cmd);
  }
}

async function aiExplain(command) {
  const apiKey = "YOUR_OPENAI_API_KEY";
  if (!apiKey) return;

  try {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + apiKey,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [{ role: "user", content: "Explain: " + command }]
      })
    });

    const data = await res.json();
    document.getElementById("ai").innerHTML =
      `<div class="card"><strong>🤖 AI:</strong><p>${data.choices[0].message.content}</p></div>`;
  } catch (e) {}
}

loadTheme();
visitorCount();
loadFromURL();
</script>

</body>
</html>
